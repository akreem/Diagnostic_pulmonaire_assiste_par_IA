services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pfd
      POSTGRES_USER: pfd
      POSTGRES_PASSWORD: pfd_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfd -d pfd"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pfd_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ../.env.example
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pfd_postgres_data:
