services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pfd
      POSTGRES_USER: pfd
      POSTGRES_PASSWORD: pfd_dev_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfd -d pfd"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - pfd_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      model-service:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  model-service:
    build:
      context: ../deploy
      dockerfile: Dockerfile
    environment:
      - ORT_NUM_THREADS=4
    ports:
      - "8001:8000"
    volumes:
      - ../checkpoints:/app/checkpoints:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}
      - VITE_HMR_HOST=${VITE_HMR_HOST:-}
      - VITE_HMR_PROTOCOL=${VITE_HMR_PROTOCOL:-}
      - VITE_HMR_PORT=${VITE_HMR_PORT:-}
      - VITE_HMR_CLIENT_PORT=${VITE_HMR_CLIENT_PORT:-}
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  pfd_postgres_data:
